  - id: pane-2
    name: 任务 1：标准化 BrowserAgent Gateway 协议
    agent: codex
    runtime: pty
    pid: 32488
    status: idle
    isolation: shared
    workdir: /Users/yofineliu/Workspace/Agenticify
    task: |-
      你在 /Users/yofineliu/Workspace/Agenticify 工作。请充分阅读
        README、docs/superpowers/specs、src/shared/types.ts、src/
        background/index.ts、src/injected/browserAgent.ts、src/
        content/index.ts。

        目标：把当前 window.browserAgent 网关从 demo API 升级成第一
        版稳定协议，但不要暴露“AI 钱包”命名。用户-facing 名称仍然使
        用 BrowserAgent Gateway / Site Access / Call History。

        需要完成：
        1. 设计并实现 v1 gateway 协议类型：
           - window.browserAgent.requestAccess(...)
           - window.browserAgent.getStatus(...)
           - window.browserAgent.chat(...)
           - window.browserAgent.run(...)
           - 可选：window.browserAgent.models.list()
        2. 明确请求、响应、错误结构：
           - ok / error / code / requestId
           - 权限不足、模型未配置、用户拒绝、gateway 关闭、页面不可
        操作等错误码
        3. 权限 scope 至少包含：
           - model.chat
           - page.read
           - page.act
           - agent.run
           - debugger.control，第一版可 gated
        4. 保持 API key 只在 extension storage，绝不暴露给网页。
        5. 更新 injected/content/background 的消息桥接，使协议结构一
        致。
        6. 添加或更新测试，覆盖权限不足、gateway 关闭、授权成功、
        chat/run 请求结构。
        7. 更新 README 的 Gateway Example，但不要使用 AI Wallet 叙
        事。

        写入范围优先：
        - src/shared/types.ts
        - src/injected/browserAgent.ts
        - src/content/index.ts
        - src/background/index.ts
        - src/shared/permissions.ts
        - 相关测试
        - README.md

        注意：你不是唯一一个在代码库工作的 agent。不要重构无关 UI，
        不要改 sidepanel/options 样式，避免和其他任务冲突。完成后运
        行 pnpm test 和 pnpm run build。
    started_at: '2026-04-25T16:43:13.303Z'
