  - id: pane-4
    name: 任务 3：基于 pi-mono 的简易 Agent Runtime
    agent: codex
    runtime: pty
    pid: 34361
    status: idle
    isolation: shared
    workdir: /Users/yofineliu/Workspace/Agenticify
    task: |-
      你在 /Users/yofineliu/Workspace/Agenticify 工作。请阅读 src/
        agent/runtime.ts、src/content/domTools.ts、src/background/
        index.ts、docs/superpowers/specs/2026-04-25-agenticify-
        browser-agent-design.md。

        目标：把当前“一次 observe + 一次回答”的 runtime 升级为基于
        pi-mono 思路的简易 Browser Agent。第一版要能短任务运行，不追
        求复杂长期自治。

        需要完成：
        1. 调研当前项目是否已有 pi-mono 依赖；如果没有，优先判断是否
        需要安装依赖。若安装依赖受限，先实现 pi-mono adapter 边界，
        避免把 runtime 写死。
        2. 实现 bounded observe-act loop：
           - maxSteps 默认 3，最多 5
           - observe
           - model decide
           - optional action
           - observe again
           - final
        3. 定义模型输出协议：
           - final answer
           - action: click/type/scroll/read
           - reason
           - confidence
        4. action 执行必须保守：
           - 默认 DOM 工具
           - 高风险动作必须返回 needs_confirmation 或 blocked
           - debugger action 需要单独授权
        5. AgentEvent 要能驱动 sidepanel timeline：
           - observe
           - thought/plan
           - action
           - action-result
           - blocked


        6. 添加测试：
           - 单轮问答
           - 模型要求 click 时执行工具
           - maxSteps 生效
           - action 失败后停止或恢复
           - 高风险动作被拦截
        7. 保持 background 路由兼容 sidebar-run 和 gateway-run。


        - src/agent/runtime.ts
        - src/agent/runtime.test.ts
        - src/shared/types.ts，如任务 1 已修改则兼容它
        - src/background/index.ts 只做必要接入

        注意：你不是唯一一个在代码库工作的 agent。不要改 options
        UI，不要改 model provider UI。完成后运行 pnpm test 和 pnpm
        run build。
    started_at: '2026-04-25T16:45:07.759Z'
  - id: pane-5
    name: 任务 4：Chrome Debugger API 工具层
    agent: codex
    runtime: pty
    pid: 35239
    status: idle
    isolation: shared
    workdir: /Users/yofineliu/Workspace/Agenticify
    task: |-
      你在 /Users/yofineliu/Workspace/Agenticify 工作。请阅读
        manifest.json、src/background/index.ts、src/content/
        domTools.ts、src/shared/permissions.ts、src/shared/
        types.ts。

        目标：实现第一版 Chrome Debugger API 工具层，让 Agent 在用户
        授权后可以更可靠地读取和操作页面。不要默认启用 debugger，必
        须 gated。

        需要完成：
        1. 新增 debugger 工具模块，封装 Chrome Debugger API：
           - attach / detach
           - get document snapshot 或 accessibility/DOM 信息
           - click by coordinates 或 selector-derived position
           - type text
           - scroll
           - wait
        2. 权限策略：
           - debugger.control scope
           - active tab only
           - 用户显式授权后才能 attach
           - 每次 attach/detach 写 debug log
        3. background 中提供 debugger action router。
        4. Agent runtime 可选择 DOM mode / debugger mode / auto
        mode。
        5. 遇到无法 attach、页面不支持、用户未授权时，要返回明确错
        误，不要静默失败。
        6. 添加测试时尽量 mock chrome.debugger，不要求真实浏览器
        e2e。
        7. README 或 docs 说明 Debugger mode 是高级控制能力。

        写入范围优先：
        - src/background/debuggerTools.ts 或类似新文件
        - src/background/index.ts

        - src/shared/permissions.ts
        - src/agent/runtime.ts 只做接口接入
        - 相关测试

        注意：你不是唯一一个在代码库工作的 agent。不要大改
        sidepanel/options 视觉。完成后运行 pnpm test 和 pnpm run
        build。
